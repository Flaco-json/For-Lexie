<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Lexie ❤️</title>
<style>
body{
font-family:Arial,sans-serif;
background:#fdeef4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
}
.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
max-width:700px;
}
button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:999px;
cursor:pointer;
margin:10px;
}
#yes{background:#ff7da5;color:white;}
</style>
</head>
<body>

<div class="card">
<h1>May I Be Your Boyfriend? ❤️</h1>

<p>
My love,<br><br>
Every day I learn more about you, and every day I grow into someone who hopes to be worthy of your love and appreciation.
I will never stop adoring you or supporting you in every way I possibly can.
<br><br>
Forever yours,<br>
Jason ❤️
</p>

<button id="yes" onclick="alert('You just made me the happiest person alive ❤️')">
Yes 💖
</button>

<button onclick="this.style.display='none';document.getElementById('yes').style.transform='scale(2)'">
No 🤍
</button>
</div>

</body>
</html>
